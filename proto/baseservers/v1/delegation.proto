syntax = "proto3";
package baseservers.v1;
option go_package = "github.com/SilasSolivagus/base-servers/gen/baseservers/v1;baseserversv1";

message IssueRequest {
  string agent_id = 1;
  string delegator_id = 2;
  string org_id = 3;
  repeated string scope = 4;
  int64 ttl_seconds = 5;
  string cnf_jkt = 6; // RFC 9449 DPoP key thumbprint to bind the issued token to
}
message IssueResponse { string token = 1; string delegation_id = 2; }

message RevokeRequest { string delegation_id = 1; }
message RevokeResponse {}

message CheckDelegatedRequest {
  string token = 1;
  string action = 2;
  string resource_type = 3;
  string resource_id = 4;
  string org_id = 5;
  string team_id = 6;
  string dpop_proof = 7;  // RFC 9449 DPoP proof JWT; optional, RS-forwarded
  string http_method = 8; // HTTP method of the request being authorized; required with dpop_proof
  string http_uri = 9;    // HTTP URI (no query/fragment) of the request; required with dpop_proof
}
message CheckDelegatedResponse { bool allowed = 1; }

service DelegationService {
  rpc Issue(IssueRequest) returns (IssueResponse);
  rpc Revoke(RevokeRequest) returns (RevokeResponse);
  rpc CheckDelegated(CheckDelegatedRequest) returns (CheckDelegatedResponse);
}

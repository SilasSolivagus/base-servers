syntax = "proto3";
package baseservers.v1;
option go_package = "github.com/SilasSolivagus/base-servers/gen/baseservers/v1;baseserversv1";

message Role { string id = 1; string org_id = 2; string name = 3; repeated string permissions = 4; }

message CreateRoleRequest { string org_id = 1; string name = 2; repeated string permissions = 3; }
message CreateRoleResponse { Role role = 1; }
message AssignRoleRequest {
  string principal_id = 1;
  string role_id = 2;
  string scope_type = 3; // "org" | "team"
  string scope_id = 4;
}
message AssignRoleResponse {}

service RoleService {
  rpc CreateRole(CreateRoleRequest) returns (CreateRoleResponse);
  rpc AssignRole(AssignRoleRequest) returns (AssignRoleResponse);
}

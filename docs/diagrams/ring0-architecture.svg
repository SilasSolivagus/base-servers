<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 700" width="960" height="700">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
  </defs>
  <rect width="960" height="700" fill="#ffffff"/>
  <text x="480" y="38" text-anchor="middle" font-size="18" font-weight="600" fill="#111827">base-servers · Ring 0 内核运行架构</text>
  <text x="480" y="58" text-anchor="middle" font-size="12" fill="#6b7280">agent 原生的身份 / 组织 / 权限底座 · 可插拔身份引擎 + 适配器层</text>
  <rect x="60" y="80" width="840" height="104" rx="10" fill="#f9fafb" stroke="#9ca3af" stroke-width="1.3" stroke-dasharray="6,4"/>
  <text x="78" y="102" font-size="13" font-weight="600" fill="#374151">调用方 Consumers</text>
  <rect x="100" y="116" width="340" height="48" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="270" y="136" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">业务系统 · 任意语言</text>
  <text x="270" y="154" text-anchor="middle" font-size="11" fill="#6b7280">任何语言几行代码接入</text>
  <rect x="540" y="116" width="320" height="48" rx="8" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1.5"/>
  <text x="700" y="136" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">AI Agents</text>
  <text x="700" y="154" text-anchor="middle" font-size="11" fill="#6b7280">受托主体 · 一等公民</text>
  <rect x="60" y="250" width="840" height="200" rx="10" fill="#f9fafb" stroke="#9ca3af" stroke-width="1.3" stroke-dasharray="6,4"/>
  <text x="78" y="272" font-size="13" font-weight="600" fill="#374151">base-servers API 层 · 我们构建（净增值）</text>
  <rect x="96" y="290" width="220" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="206" y="312" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">统一 API · 委托层</text>
  <text x="206" y="330" text-anchor="middle" font-size="11" fill="#6b7280">OBO / token-exchange</text>
  <rect x="360" y="290" width="180" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="450" y="312" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">权限 check()</text>
  <text x="450" y="330" text-anchor="middle" font-size="11" fill="#6b7280">RBAC + 归属</text>
  <rect x="590" y="290" width="244" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="712" y="312" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">组织·成员·角色 管理</text>
  <text x="712" y="330" text-anchor="middle" font-size="11" fill="#6b7280">agent 注册 / 委托签发</text>
  <rect x="110" y="372" width="320" height="52" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="270" y="394" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Identity Adapter</text>
  <text x="270" y="412" text-anchor="middle" font-size="11" fill="#6b7280">映射到引擎 · 可换</text>
  <rect x="500" y="372" width="340" height="52" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="670" y="394" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">AuthZ Port</text>
  <text x="670" y="412" text-anchor="middle" font-size="11" fill="#6b7280">RBAC + ownership · ReBAC 预留</text>
  <rect x="60" y="516" width="840" height="112" rx="10" fill="#f9fafb" stroke="#9ca3af" stroke-width="1.3" stroke-dasharray="6,4"/>
  <text x="78" y="538" font-size="13" font-weight="600" fill="#374151">引擎与存储 Engine &amp; Storage</text>
  <rect x="100" y="548" width="470" height="56" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="335" y="572" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">身份引擎 Identity Engine</text>
  <text x="335" y="590" text-anchor="middle" font-size="11" fill="#6b7280">OIDC/OAuth2 · Organizations · Token-Exchange · DPoP · CAEP</text>
  <rect x="650" y="548" width="210" height="56" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="755" y="572" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">PostgreSQL</text>
  <text x="755" y="590" text-anchor="middle" font-size="11" fill="#6b7280">统一持久化</text>
  <path d="M 270,164 L 270,250" stroke="#2563eb" stroke-width="1.8" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="280" y="212" font-size="12" fill="#374151">OIDC / gRPC·REST</text>
  <path d="M 700,164 L 700,250" stroke="#9333ea" stroke-width="1.8" fill="none" stroke-dasharray="6,4" marker-end="url(#arrow-purple)"/>
  <text x="710" y="212" font-size="12" fill="#6b21a8">Token-Exchange / OBO 委托</text>
  <path d="M 270,424 L 270,500 L 335,500 L 335,548" stroke="#2563eb" stroke-width="1.8" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M 670,424 L 670,500 L 755,500 L 755,548" stroke="#16a34a" stroke-width="1.8" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M 570,576 L 650,576" stroke="#16a34a" stroke-width="1.8" fill="none" marker-end="url(#arrow-green)"/>
  <line x1="60" y1="662" x2="92" y2="662" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrow-blue)"/>
  <text x="98" y="666" font-size="12" fill="#6b7280">主请求:OIDC / gRPC·REST</text>
  <line x1="300" y1="662" x2="332" y2="662" stroke="#9333ea" stroke-width="1.8" stroke-dasharray="6,4" marker-end="url(#arrow-purple)"/>
  <text x="338" y="666" font-size="12" fill="#6b7280">agent 委托:Token-Exchange / OBO</text>
  <line x1="620" y1="662" x2="652" y2="662" stroke="#16a34a" stroke-width="1.8" marker-end="url(#arrow-green)"/>
  <text x="658" y="666" font-size="12" fill="#6b7280">持久化</text>
  <text x="740" y="666" font-size="11" fill="#9ca3af">身份引擎可插拔·实现无关</text>
</svg>
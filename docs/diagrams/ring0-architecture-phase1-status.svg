  <path d="M 270,424 L 270,500 L 335,500 L 335,548" stroke="#6b7280" stroke-width="1.6" fill="none" marker-end="url(#arrow-gray)"/>
  <path d="M 670,424 L 670,500 L 755,500 L 755,548" stroke="#9ca3af" stroke-width="1.6" fill="none" stroke-dasharray="6,4" marker-end="url(#arrow-gray)"/>
  <path d="M 570,576 L 650,576" stroke="#6b7280" stroke-width="1.6" fill="none" marker-end="url(#arrow-gray)"/>
  <rect x="60" y="653" width="16" height="16" rx="4" fill="#f0fdf4" stroke="#86efac" stroke-width="1.4"/>
  <text x="84" y="666" font-size="12" fill="#374151">Phase 1 已实现</text>
  <rect x="280" y="653" width="16" height="16" rx="4" fill="#fff7ed" stroke="#fdba74" stroke-width="1.4"/>
  <text x="304" y="666" font-size="12" fill="#374151">Phase 1 部分(其余标 P2/P3/P4)</text>

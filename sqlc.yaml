version: "2"
sql:
  - engine: postgresql
    schema: db/migrations
    queries: db/query/principal.sql
    gen:
      go:
        package: db
        out: internal/principal/db
        sql_package: pgx/v5
  - engine: postgresql
    schema: db/migrations
    queries: db/query/org.sql
    gen:
      go:
        package: db
        out: internal/org/db
        sql_package: pgx/v5
  - engine: postgresql
    schema: db/migrations
    queries: db/query/role.sql
    gen:
      go: { package: db, out: internal/role/db, sql_package: pgx/v5 }
  - engine: postgresql
    schema: db/migrations
    queries: db/query/authz.sql
    gen:
      go: { package: db, out: internal/authz/db, sql_package: pgx/v5 }

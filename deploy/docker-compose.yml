services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: base
      POSTGRES_PASSWORD: base
      POSTGRES_DB: baseservers
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U base -d baseservers"]
      interval: 5s
      timeout: 3s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.4
    command: ["start-dev", "--health-enabled=true"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_FEATURES: token-exchange,dpop
      KC_HOSTNAME: ${BS_PUBLIC_URL:-http://localhost:8088}/oidc
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
    ports: ["8080:8080"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  base-servers:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      HTTP_ADDR: ":8081"
      DATABASE_URL: postgres://base:base@postgres:5432/baseservers?sslmode=disable
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: base-servers
      # 生产请用真 secret 注入(不要提交明文);此处仅为一键起演示。
      BS_SIGNING_KEK: ${BS_SIGNING_KEK:?set BS_SIGNING_KEK to base64 of 32 bytes}
      DELEGATION_ISSUER: http://localhost:8081
      OIDC_LOGIN_REDIRECT_URIS: ${OIDC_LOGIN_REDIRECT_URIS:-http://localhost:8088/callback}
      BS_SERVICE_CLIENT_SECRET: ${BS_SERVICE_CLIENT_SECRET:?set BS_SERVICE_CLIENT_SECRET}
      BS_PUBLIC_ISSUER: ${BS_PUBLIC_URL:-http://localhost:8088}/oidc/realms/base-servers
      BS_ROOT_TOKEN: ${BS_ROOT_TOKEN:?set BS_ROOT_TOKEN for bootstrap}
      BS_APIKEY_PEPPER: ${BS_APIKEY_PEPPER:?set BS_APIKEY_PEPPER to base64 of 32 bytes}
    ports: ["8081:8081"]
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/base-servers", "healthcheck"]  # probes local /readyz (pure-Go, no shell needed)
      interval: 10s
      timeout: 3s
      retries: 5

  caddy:
    image: caddy:2
    ports: ["8088:80"]
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      base-servers:
        condition: service_healthy
      keycloak:
        condition: service_healthy

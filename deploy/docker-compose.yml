services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: base
      POSTGRES_PASSWORD: base
      POSTGRES_DB: baseservers
    ports: ["5432:5432"]
  keycloak:
    image: quay.io/keycloak/keycloak:26.4
    command: ["start-dev"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_FEATURES: token-exchange,dpop
    ports: ["8080:8080"]
    depends_on: [postgres]
